<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  
  <title>Frontend Mentor | Interactive rating component</title>

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Rating state start -->
  <main>
    <div class="card">
      <img class="round" src="images/icon-star.svg" alt="star">
      <h2 >How did we do?</h2  >  

      <p> Please let us know how we did with your support request. All feedback is appreciated 
     to help us improve our offering!</p>
   
      <div id="rating-container">
        <button class="ratingScore">1</button>
        <button class="ratingScore">2</button>
        <button class="ratingScore">3</button>
        <button class="ratingScore">4</button>
        <button class="ratingScore">5</button>
      </div>
   
      <button id="submitButton">SUBMIT</button>
    </div>
  </main>
  



  <!-- Rating state end -->

  <!-- Thank you state start -->

  <!-- You selected Add rating here out of 5 -->
<!-- 
  Thank you!

  We appreciate you taking the time to give a rating. If you ever need more support, 
  don’t hesitate to get in touch! -->

  <!-- Thank you state end -->

  

</body>
</html>
